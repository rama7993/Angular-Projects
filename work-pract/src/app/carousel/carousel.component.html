<div class="margin-auto box-shadow" [ngStyle]="{ width: '100%' }">
  <ng-image-slider
    #nav
    [images]="imageObject"
    [infinite]="true"
    [autoSlide]="true"
    [videoAutoPlay]="true"
    [paginationShow]="false"
    [imageSize]="{ width: '33.33%', height: 430 }"
    [animationSpeed]="0.1"
  ></ng-image-slider>
</div>
