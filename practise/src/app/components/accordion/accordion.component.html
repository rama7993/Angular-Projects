<div class="accordion">
  <div class="accordion-item" *ngFor="let item of items; let i = index">
    <button class="accordion-header" (click)="toggle(i)" [attr.aria-expanded]="item.isOpen">
      <span class="title">{{ item.title }}</span>
      <span class="icon">{{ item.isOpen ? '-' : '+' }}</span>
    </button>
    <div class="accordion-content-wrapper" [class.open]="item.isOpen">
      <div class="accordion-content">
        <div class="accordion-inner">
          {{ item.content }}
        </div>
      </div>
    </div>
  </div>
</div>
