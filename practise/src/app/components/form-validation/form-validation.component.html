<div class="form-container">
  <h2>Form Validation</h2>
  <form (ngSubmit)="onSubmit()" #form="ngForm">
    <div class="form-group">
      <label for="username">Username</label>
      <input
        type="text"
        id="username"
        name="username"
        [(ngModel)]="formData.username"
        (blur)="validateField('username')"
        (input)="submitted ? validateField('username') : null"
        [class.invalid]="errors['username']"
      />
      <div class="error-msg" *ngIf="errors['username']">
        {{ errors["username"] }}
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        [(ngModel)]="formData.email"
        (blur)="validateField('email')"
        (input)="submitted ? validateField('email') : null"
        [class.invalid]="errors['email']"
      />
      <div class="error-msg" *ngIf="errors['email']">{{ errors["email"] }}</div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        [(ngModel)]="formData.password"
        (blur)="validateField('password')"
        (input)="submitted ? validateField('password') : null"
        [class.invalid]="errors['password']"
      />
      <div class="error-msg" *ngIf="errors['password']">
        {{ errors["password"] }}
      </div>
    </div>

    <button
      type="submit"
      class="submit-btn"
      [disabled]="
        !formData.username &&
        !formData.email &&
        !formData.password &&
        !submitted
      "
    >
      Submit
    </button>
  </form>
</div>
